    #     state: in_progress
    #     caller: "{{ sn_username }}"
    #     number: "{{ incident_number_cached }}"
    #     other:
    #       work_notes: "Job {{ job_results.job_id}} completed with {{ job_results.ret_code.msg }} {{ job_results.ret_code.msg_code }}"
